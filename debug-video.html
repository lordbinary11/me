<!DOCTYPE html>
<html>
<head>
    <title>Video Debug Test</title>
</head>
<body>
    <h1>Video Debug Test</h1>
    
    <h2>Test 1: Basic YouTube Embed</h2>
    <iframe 
      width="560" 
      height="315" 
      src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
      title="YouTube video player"
      frameborder="0" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
      allowfullscreen>
    </iframe>
    
    <h2>Test 2: Simple YouTube Embed</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
    
    <h2>Test 3: Privacy YouTube Embed</h2>
    <iframe width="560" height="315" src="https://www.youtube-nocookie.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
    
    <h2>Test 4: Direct Link</h2>
    <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank">Open YouTube Video</a>
    
    <h2>Test 5: Video Tag</h2>
    <video width="560" controls>
      <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
</body>
</html>
